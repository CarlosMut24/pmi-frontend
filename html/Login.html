<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #121212;
      font-family: Arial, sans-serif;
    }

    .login-container {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      color: #fff;
      margin-bottom: 20px;
    }

    input {
      width: 93%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 5px;
      outline: none;
    }

    input[type="text"],
    input[type="password"] {
      background: #2c2c2c;
      color: #fff;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #c03232;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #d30c0c;
    }

    .creditos{
      color: #121212;
      justify-content:left;
      align-items: end;
      display: flex;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h2>Login</h2>
    
    <form id="loginForm">
      <input type="text" id="usuario"  placeholder="Usuário" name="usuario_fake" autocomplete="off" required>
      <input type="password" id="senha" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>

    <p id="erro" style="color: red;"></p>
  </div>
  <div class="creditos">
    <p>Feito por Carlos Henrique Zanini Funchal</p>
  </div>
  <script src="../js/Login.js"></script>
</body>
</html>
