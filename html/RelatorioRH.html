<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="">
    <title>Relstorio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            margin: 0;
        }

        .topbar {
            background: #1e1e1e;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
        }

        .topbar {
            height: 60px;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .topbar button {
            background: #c03232;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .topbar button:hover {
            background: #d30c0c;
        }

        .container {
            width: 80%;
            margin: 20px auto;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        input {
            width: 38%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 0px;
        }

        select {
            width: 12%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 0px;
        }

        .btn {
            width: 20%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #c03232;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .relatorio {
            width: 10%;
            height: 40px;
            padding: 10px;
            border: none;
            font-size: 100%;
            border-radius: 8px;
            background: #c03232;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #d30c0c;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .row input, .row select {
            padding: 8px;
        }

        #nome{
            width: 80%;
        }

        .info {
            display: flex;
            justify-content: center;
            gap: 100px;
            margin-bottom: 0px;
            color: white;
            font-size: 20px;
            align-items: center;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
        }

        .table th, .table td {
            border: 5px solid #929292;
            padding: 5px;
            text-align: center;
            border-radius: 10px;            
        }

        .table th {
            background: #ffdede;
        }

        .table td {
            background: #fde9e9;
            gap: 10px;
        }
        .table button {
            width: 40%;
        }
        
        .erro {
            color: #f87171;
            margin-top: 10px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: white;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            width: 300px;
        }

        .modal-content button {
            margin-top: 15px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: #c03232;
            color: white;
            cursor: pointer;
        }

        .jenela{
            display: none;
            justify-content: center;
        }

        .tabs{
            display: flex;
            background-color: #2b2b2b;
            border-radius: 8px;
            padding: 8px 16px;
            justify-content: center;
            gap: 20px;
        }

        .tabs button{
            width: 10%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #c03232;
            color: white;
            cursor: pointer;
        }

        .btnIcone {
            width: 5px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #c03232;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btnIcone:hover {
            background: #d30c0c;
        }

    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
    <body>
        <div class="topbar">
        <button onclick="voltar()"><i class="bi bi-arrow-return-left"></i> Voltar</button>
        <button onclick="logout()"><i class="bi bi-door-closed-fill"></i> Logout</button>
        </div>

    <div class="container">
        <div class="card">
            <div class="tabs">
                <button onclick="abrirFarmacias()" id="btnFarmacias">Farmácias</button>
                <button onclick="abrirFuncionario()" id="btnFuncionarios"><strong>Funcionários</strong></button>
                <button onclick="abrirFechamento()" id="btnFechamentos">Fechamentos</button>
                </br><p class="erro" id="erroBusca"></p>
            </div>

            <div class="jenela" id="abaFarmacias">
                <table class="table">
                    <thead>
                        <tr>
                            <th>NOME</th>
                            <th>CNPJ</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaFarmacias">
                    </tbody>
                </table>
            </div>

            <div class="jenela" id="abaFuncionarios">
                <table class="table">
                    <thead>
                        <tr>
                            <th>NOME</th>
                            <th>CPF</th>
                            <th>Matricula</th>
                            <th>Contrato</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaFuncionarios">
                    </tbody>
                </table>
            </div>

            <div class="jenela" id="abaFechamentos">
               
                </br>
                <select id="mes">
                    <option value="">Mês </option>
                    <option value="00">Janeiro </option>
                    <option value="01">Fevereiro </option>
                    <option value="02">Março</option>
                    <option value="03">Abril </option>
                    <option value="04">Maio </option>
                    <option value="05">Junho </option>
                    <option value="06">Julho </option>
                    <option value="07">Agosto </option>
                    <option value="08">Setembro </option>
                    <option value="09">Outubro </option>
                    <option value="10">Novembro </option>
                    <option value="11">Dezembro </option>
                </select>

                <select id="ano">
                    <option value="2026">2026</option>
                    <!--<option value="2027">2027</option>-->
                </select>
                </br>
                <p></p>

                <table class="table">
                    <thead>
                        <tr>
                            <th>Mês</th>
                            <th>Ano</th>
                            <th>Perildo</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaFechamentos">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modalTexto"></p>
            <button onclick="fecharModal()">OK</button>
        </div>
    </div>

    <div id="alerta" class="modal">
        <div class="modal-content">
            <p id="alertaTexto"></p>
            <button onclick="fecharAlerta()">OK</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>    
    <script src="../js/RelatorioRH.js"></script>
</body>
</html>
