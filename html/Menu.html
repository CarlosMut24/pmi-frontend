<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #121212;
            color: #fff;
        }

        /* 🔷 TOP BAR */
        .topbar {
            width: 100%;
            height: 60px;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .topbar h1 {
            font-size: 20px;
        }

        .logout-btn {
            background: #c03232;
            border: none;
            padding: 8px 16px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #d30c0c;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 60px);
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(2, 200px);
            gap: 20px;
        }

        .card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #d30c0c;
        }

        .card h2 {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <!--<img src="..\imagens\pngegg.png" alt="Logo">-->
        <h1>Sistema Farmácia</h1>
        <button class="logout-btn" onclick="logout()">Sair</button>
    </div>

    <div class="container">
        <div class="menu">

            <div class="card" id="btnCompra" onclick="irParaCompra()">
                <h2>Registrar Compra</h2>
            </div>

            <div class="card" id="btnConsultar_Cliente" onclick="irParaConsulta()">
                <h2>Consultar Compra</h2>
            </div>

            <div class="card" id="btnAddFuncionario" onclick="irParaAddFuncionario()">
                <h2>Adicionar Funcionario</h2>
            </div>
            
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>
    <script src="../js/Menu.js"></script>
</body>
</html>
