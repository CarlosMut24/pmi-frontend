<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Compra</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            margin: 0;
        }

        .topbar {
            background: #1e1e1e;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
        }

        .topbar {
            height: 60px;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .topbar button {
            background: #c03232;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .topbar button:hover {
            background: #d30c0c;
        }

        .container {
            width: 1000px;
            margin: 20px auto;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        input {
            width: 38%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 0px;
        }

        select {
            width: 12%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 0px;
        }

        .btn {
            width: 20%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #c03232;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #d30c0c;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .row input, .row select {
            padding: 8px;
        }

        #nome{
            width: 80%;
        }

        .info {
            display: flex;
            justify-content: center;
            gap: 100px;
            margin-bottom: 0px;
            color: white;
            font-size: 20px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
        }

        .table th, .table td {
            border: 5px solid #929292;
            padding: 5px;
            text-align: center;
            border-radius: 10px;            
        }

        .table th {
            background: #ffdede;
        }

        .table td {
            background: #fde9e9;
            gap: 10px;
        }
        .table button {
            width: 40%;
        }
        
        .erro {
            color: #f87171;
            margin-top: 10px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: white;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            width: 300px;
        }

        .modal-content button {
            margin-top: 15px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: #c03232;
            color: white;
            cursor: pointer;
        }

    </style>
</head>

<body>

    <div class="topbar">
        <button onclick="voltar()">Voltar</button>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="container">

        <div class="card">
            
            <div class="row" id="top_row">
                <input type="text" placeholder="CPF" id="cpf" name="cpf_fake"
                 autocomplete="new-password">

                <input type="text" placeholder="Codigo do compra" id="id">

                <select id="mes">
                    <option value="">Mês </option>
                    <option value="00">Janeiro </option>
                    <option value="01">Fevereiro </option>
                    <option value="02">Março</option>
                    <option value="03">Abril </option>
                    <option value="04">Maio </option>
                    <option value="05">Junho </option>
                    <option value="06">Julho </option>
                    <option value="07">Agosto </option>
                    <option value="08">Setembro </option>
                    <option value="09">Outubro </option>
                    <option value="10">Novembro </option>
                    <option value="11">Dezembro </option>
                </select>

                <select id="ano">
                    <option value="2026">2026</option>
                    <!--<option value="2027">2027</option>-->
                </select>
            </div>
            <br>
            <div class="row">
                <input type="text" placeholder="Nome do Cliente" id="nome">
                <button class="btn" onclick="consultar()">Consultar</button>
            </div>
            <p class="erro" id="erroBusca"></p>
        </div>

        <div class="card" id="resultado">
            <div class="info" id="info">
                <p><strong>VOLOR TOTAL: R$<span id="total">-</span></strong></p>
                <p><strong>NUMERO  DE COMPRAS: <span id="numero">-</span></strong></p>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Empresa</th>
                        <th>Data</th>
                        <th>Total</th>
                        <th>Parcelas</th>
                        <th>Valor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaCompras">
                </tbody>
            </table>

        </div>

    </div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modalTexto"></p>
            <button onclick="fecharModal()">OK</button>
        </div>
    </div>
    <script src="../js/ConsultaCompra.js"></script>

</body>
</html>
