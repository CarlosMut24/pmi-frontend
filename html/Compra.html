<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Compra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #121212;
            color: #fff;
        }

        /* 🔷 TOPO */
        .topbar {
            height: 60px;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .topbar button {
            background: #c03232;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .topbar button:hover {
            background: #d30c0c;
        }

        .logout {
            background: #c03232;
        }

        .logout:hover {
            background: #c03232;
        }

        /* 🔷 CONTEÚDO */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 60px);
        }

        .cards {
            display: flex;
            gap: 30px;
        }

        .card {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 16px;
            width: 300px;
        }

        .card h2 {
            margin-bottom: 20px;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
            margin-top: 15px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #c03232;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #d30c0c;
        }

        .info p {
            margin-bottom: 8px;
        }

        .erro {
            color: #f87171;
            margin-top: 10px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            width: 300px;
        }

        .modal-content button {
            margin-top: 15px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: #c03232;
            color: white;
            cursor: pointer;
        }
    </style>

</head>
    <body>
        <div class="topbar">
        <button onclick="voltar()">⬅ Menu</button>
        <button class="logout" onclick="logout()">Sair</button>
        </div>

    <!-- 🔷 CONTEÚDO -->
    <div class="container">
        <div class="cards">
            <div class="card">
                <h2>Buscar Funcionário</h2>

                <input type="text" id="cpf" placeholder="Digite o CPF" name="cpf_fake" 
                autocomplete="new-password">
                <button class="btn" onclick="buscar()">Buscar</button>

                <p class="erro" id="erroBusca"></p>
            </div>
            <h1 id="ceta">→</h1>
            <div id="card_Informações" class="card">
                <h2>Informações</h2>

                <div class="info">
                    <p><strong>Nome:</strong> <span id="nome">-</span></p>
                    <p><strong>Empresa:</strong> <span id="empresa">-</span></p>
                    <p><strong>Saldo: <span id="saldo">-</span></strong></p>
                    <!--<p><strong>Limite: <span id="limite">-</span></strong></p>-->
                </div>

                <input type="number" id="valor" placeholder="Valor da compra">
                <select id="parcelas">
                    <option value=1>A Vista</option>
                    <option value=2>2 Parcelas</option>
                    <option value=3>3 Parcelas</option>
                </select>

                <button class="btn" onclick="comprar()">Registrar Compra</button>

                <p class="erro" id="erroCompra"></p>
            </div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modalTexto"></p>
            <button onclick="fecharModal()">OK</button>
        </div>
    </div>
    
    <script src="../js/Compra.js"></script>
</body>
</html>
